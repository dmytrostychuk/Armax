    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --border: #eeeeee;
            --accent: #000000;
            --gray: #888888;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- Базові стилі --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Плавний курсор (тільки для десктопа) --- */
        @media (min-width: 1025px) {
            body, button, a, .card__visual { cursor: none !important; }
            .cursor-dot, .cursor-follower {
                position: fixed; top: 0; left: 0; pointer-events: none; z-index: 10000; border-radius: 50%; will-change: transform;
            }
            .cursor-dot { width: 6px; height: 6px; background: #fff; mix-blend-mode: difference; }
            .cursor-follower { width: 40px; height: 40px; border: 1px solid rgba(128, 128, 128, 0.5); }
            body.cursor-active .cursor-follower { width: 80px; height: 80px; background: rgba(0,0,0,0.03); border-color: transparent; }
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }

        /* --- Header --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 0; z-index: 100;
            backdrop-filter: blur(15px); background: rgba(255,255,255,0.8);
            border-bottom: 1px solid var(--border);
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; }

        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
        .logo-img { width: 100px; height: 60px; object-fit: cover; border-radius: 4px;}
        .logo-text { font-weight: 600; font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase; }

        .switchers { display: flex; gap: 20px; }
        .switcher-group { display: flex; gap: 5px; }
        .btn-s {
            background: none; border: none; font-size: 0.75rem; padding: 5px 8px;
            color: #aaa; transition: 0.3s; font-family: inherit; font-weight: 400;
        }
        .btn-s.active { color: var(--text); font-weight: 600; border-bottom: 2px solid var(--text); }

        /* --- Hero --- */
        .hero { padding: 160px 0 40px; text-align: center; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; letter-spacing: -2px; margin-bottom: 30px; }

        .category-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 60px; flex-wrap: wrap; }
        .cat-btn {
            background: #f8f8f8; border: 1px solid #eee; padding: 12px 24px;
            border-radius: 50px; font-size: 0.85rem; color: #666; transition: var(--transition);
        }
        .cat-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

        /* --- Catalog Grid --- */
        .catalog-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 60px 30px; padding-bottom: 100px;
        }

        /* --- Product Card --- */
        .card { opacity: 0; transform: translateY(40px); transition: var(--transition); }
        .card.is-visible { opacity: 1; transform: translateY(0); }

        .card__visual {
            position: relative; aspect-ratio: 1/1; background: #ffffff;
            overflow: hidden; border-radius: 4px; border: 1px solid #f9f9f9;
            touch-action: pan-y; user-select: none;
        }

        .card__slider {
            display: flex; height: 100%; width: 100%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }
        .card__slider img {
            width: 100%; height: 100%; object-fit: contain;
            flex-shrink: 0; pointer-events: none; background-color: #f0f0f073;
            
            
        }

        .card__nav {
            position: absolute; top: 0; height: 100%; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; pointer-events: none; opacity: 0; transition: 0.3s;
        }
        .card:hover .card__nav { opacity: 1; }
        .nav-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid #eee;
            background: rgba(255,255,255,0.9); display: flex; align-items: center; 
            justify-content: center; pointer-events: auto;
        }

        .card__info { padding-top: 20px; }
        .sku { font-size: 0.7rem; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; }
        .title { font-size: 1.1rem; font-weight: 600; margin: 5px 0; min-height: 2.8rem; display: flex; align-items: center; }
        .desc { font-size: 0.85rem; color: #666; height: 45px; overflow: hidden; margin-bottom: 12px; }
        .specs { font-size: 0.8rem; border-top: 1px solid var(--border); padding-top: 10px; color: #999; }
        .price { display: block; margin-top: 15px; font-size: 1.4rem; font-weight: 300; }

        footer { padding: 60px 0; text-align: center; border-top: 1px solid var(--border); color: #999; font-size: 0.8rem; }

        /* --- Адаптивність --- */
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .header-content { flex-direction: column; gap: 10px; }
            .hero { padding: 140px 0 40px; }
            .card__nav { opacity: 1; }
            .nav-btn { width: 32px; height: 32px; }
            .cursor-dot, .cursor-follower { display: none !important; }
        }
    </style>
</head>

// --- ПІСЛЯ ЦЬОГО БЛОКУ КОД ЗАЛИШАЄТЬСЯ БЕЗ ЗМІН ---

       

        // --- ЛОГІКА ВАЛЮТ ---
        async function fetchRates() {
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/UAH');
                const data = await res.json();
                rates = { UAH: 1, USD: data.rates.USD, EUR: data.rates.EUR };
            } catch(e) { console.warn("Rates API failed"); }
            render();
        }

        // --- РЕНДЕР СТОРІНКИ ---
        function render() {
            const t = translations[currentLang];
            document.getElementById('hero-title').innerText = t.title;
            document.getElementById('footer-text').innerText = t.footer;

            // Навігація категорій
            document.getElementById('category-nav').innerHTML = Object.keys(t.cats).map(k => `
                <button class="cat-btn ${activeCategory===k?'active':''}" onclick="setCategory('${k}', this)">${t.cats[k]}</button>
            `).join('');

            // Сітка товарів
            const filtered = productsData.filter(p => p.category === activeCategory);
            document.getElementById('catalog').innerHTML = filtered.map(p => `
                <article class="card">
                    <div class="card__visual" data-id="${p.id}">
                        <div class="card__slider" id="slider-${p.id}" data-index="0">
                            ${p.imgs.map(img => `<img src="${img}" alt="Product">`).join('')}
                        </div>
                        ${p.imgs.length > 1 ? `
                        <div class="card__nav">
                            <button class="nav-btn" onclick="moveSlide(${p.id}, -1)">←</button>
                            <button class="nav-btn" onclick="moveSlide(${p.id}, 1)">→</button>
                        </div>` : ''}
                    </div>
                    <div class="card__info">
                        <span class="sku">${t.sku}: ${p.sku}</span>
                        <h2 class="title">${p.name[currentLang]}</h2>
                        <p class="desc">${p.desc[currentLang]}</p>
                        <div class="specs">${t.dims}: <strong>${p.dims}</strong></div>
                        <span class="price">${p.priceUah > 0 ? (p.priceUah * rates[currentCurr]).toFixed(currentCurr==='UAH'?0:2) + ' ' + (currentCurr==='UAH'?'₴':currentCurr==='USD'?'$':'€') : t.request}</span>
                    </div>
                </article>
            `).join('');

            initSliders();
            setupIntersection();
        }

        // --- УНІВЕРСАЛЬНИЙ СЛАЙДЕР (Pointer Events) ---
        function initSliders() {
    const visuals = document.querySelectorAll('.card__visual');
    visuals.forEach(visual => {
        let startX = 0;
        let isDown = false;

        visual.onpointerdown = (e) => {
            // ФІКС: Якщо клікнули на стрілку, не вмикаємо логіку свайпу
            if (e.target.closest('.nav-btn')) return; 

            startX = e.clientX;
            isDown = true;
            visual.setPointerCapture(e.pointerId);
        };

        visual.onpointerup = (e) => {
            if (!isDown) return;
            isDown = false;
            visual.releasePointerCapture(e.pointerId); // Звільняємо вказівник

            const diff = startX - e.clientX;
            const id = visual.dataset.id;
            if (Math.abs(diff) > 50) {
                moveSlide(id, diff > 0 ? 1 : -1);
            }
        };
    });
}

        window.moveSlide = (id, dir) => {
            const slider = document.getElementById(`slider-${id}`);
            if(!slider) return;
            const imgs = slider.querySelectorAll('img');
            let idx = (parseInt(slider.dataset.index) + dir + imgs.length) % imgs.length;
            slider.style.transform = `translateX(-${idx * 100}%)`;
            slider.dataset.index = idx;
        };

        // --- КЕРУВАННЯ СТАНОМ ---
        function setLang(l, btn) {
            currentLang = l;
            document.querySelectorAll('#lang-switcher .btn-s').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function setCurr(c, btn) {
            currentCurr = c;
            document.querySelectorAll('#curr-switcher .btn-s').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function setCategory(c, btn) {
            activeCategory = c;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function setupIntersection() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach((entry, i) => {
                    if(entry.isIntersecting) setTimeout(() => entry.target.classList.add('is-visible'), i*50);
                });
            }, {threshold: 0.1});
            document.querySelectorAll('.card').forEach(c => obs.observe(c));
        }

        // --- ПЛАВНИЙ КУРСОР ---
        const dot = document.querySelector('.cursor-dot');
        const follower = document.querySelector('.cursor-follower');
        let mX = 0, mY = 0, dX = 0, dY = 0, fX = 0, fY = 0;

        document.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; });

        function animateCursor() {
            dX += (mX - dX) * 0.2; dY += (mY - dY) * 0.2;
            fX += (mX - fX) * 0.1; fY += (mY - fY) * 0.1;
            if(dot) dot.style.transform = `translate3d(${dX}px, ${dY}px, 0) translate(-50%, -50%)`;
            if(follower) follower.style.transform = `translate3d(${fX}px, ${fY}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        document.addEventListener('mouseover', e => {
            if(e.target.closest('button, a, .card__visual')) document.body.classList.add('cursor-active');
        });
        document.addEventListener('mouseout', e => {
            if(e.target.closest('button, a, .card__visual')) document.body.classList.remove('cursor-active');
        });

        // Запуск
        fetchRates();
    </script>
